<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Save Sync</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f11;
      --surface: #1a1a1f;
      --border: #2a2a32;
      --text: #e8e8f0;
      --muted: #888899;
      --accent: #63cab7;
      --danger: #e06c75;
      --success: #98c379;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 48px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }

    h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.02em; }
    h1 span { color: var(--accent); }

    a.settings-link {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.875rem;
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      transition: color 0.15s, border-color 0.15s;
    }
    a.settings-link:hover { color: var(--text); border-color: var(--muted); }

    .empty {
      text-align: center;
      color: var(--muted);
      margin-top: 80px;
      line-height: 1.7;
    }
    .empty a { color: var(--accent); text-decoration: none; }

    .games { display: flex; flex-direction: column; gap: 14px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
    }

    .card-name {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button, label.upload-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 14px 10px;
      border: none;
      border-radius: 9px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    button:active, label.upload-btn:active { transform: scale(0.97); opacity: 0.85; }

    .btn-get  { background: var(--accent); color: #0f1a18; }
    .btn-send { background: var(--surface); color: var(--text); border: 1px solid var(--border); }

    input[type="file"] { display: none; }

    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 0.875rem;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      white-space: nowrap;
      max-width: calc(100vw - 32px);
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .toast.success { border-color: var(--success); color: var(--success); }
    .toast.error   { border-color: var(--danger);  color: var(--danger);  }
  </style>
</head>
<body>
  <header>
    <h1>Save <span>Sync</span></h1>
    <a href="/settings" class="settings-link">Manage games</a>
  </header>

  {{if not .Games}}
    <div class="empty">
      <p>No games added yet.</p>
      <p><a href="/settings">Add your first game &rarr;</a></p>
    </div>
  {{else}}
    <div class="games">
      {{range $i, $g := .Games}}
      <div class="card">
        <div class="card-name">{{$g.Name}}</div>
        <div class="actions">

          <button class="btn-get" onclick="downloadSave({{$i}}, this)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Get from PC
          </button>

          <label class="upload-btn btn-send" for="upload-{{$i}}">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            Send to PC
          </label>
          <input type="file" id="upload-{{$i}}" accept=".sav,.srm"
                 onchange="uploadSave({{$i}}, this)" />

        </div>
      </div>
      {{end}}
    </div>
  {{end}}

  <div class="toast" id="toast"></div>

  <script>
    function showToast(msg, type = "success") {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.className = `toast show ${type}`;
      setTimeout(() => { t.className = "toast"; }, 3000);
    }

    async function downloadSave(gameId, btn) {
      btn.disabled = true;
      try {
        const res = await fetch(`/game/${gameId}/download`);
        if (!res.ok) {
          let msg = `Server error (${res.status})`;
          try {
            const data = await res.json();
            if (data.error) msg = data.error;
          } catch (_) {}
          showToast(msg, "error");
          return;
        }
        const disposition = res.headers.get("Content-Disposition") || "";
        const match = disposition.match(/filename="?([^"]+)"?/);
        const filename = match ? match[1] : "save.sav";
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        a.click();
        URL.revokeObjectURL(url);
        showToast("Save downloaded", "success");
      } catch (e) {
        showToast(e.message || "Could not reach server", "error");
      } finally {
        btn.disabled = false;
      }
    }

    async function uploadSave(gameId, input) {
      const file = input.files[0];
      if (!file) return;

      const form = new FormData();
      form.append("file", file);

      try {
        const res = await fetch(`/game/${gameId}/upload`, { method: "POST", body: form });
        const data = await res.json();
        if (res.ok) {
          showToast("Save uploaded successfully", "success");
        } else {
          showToast(data.error || "Upload failed", "error");
        }
      } catch (e) {
        showToast(e.message || "Could not reach server", "error");
      }

      input.value = "";
    }
  </script>
</body>
</html>
