<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Save Sync</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="space-between">
    <h1>Save <span>Sync</span></h1>
    <a href="/settings" class="settings-link">Manage games</a>
  </header>

  {{if not .Games}}
    <div class="empty">
      <p>No games added yet.</p>
      <p><a href="/settings">Add your first game &rarr;</a></p>
    </div>
  {{else}}
    <div class="games">
      {{range $i, $g := .Games}}
      <div class="card">
        <div class="card-name">{{$g.Name}}</div>
        <div class="actions">

          <button class="btn-get" onclick="downloadSave({{$i}}, this)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Get from PC
          </button>

          <label class="upload-btn btn-send" for="upload-{{$i}}">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            Send to PC
          </label>
          <input type="file" id="upload-{{$i}}" accept=".sav,.srm"
                 onchange="uploadSave({{$i}}, this)" />

        </div>
      </div>
      {{end}}
    </div>
  {{end}}

  <div class="toast" id="toast"></div>
  <script src="/static/index.js"></script>
</body>
</html>
